<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>CSV Processor</title>
    <script defer src="/static/app.js"></script>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        td,
        th {
            border: 1px solid #ddd;
            padding: 8px;
        }

        .done {
            color: green;
        }

        .failed {
            color: red;
        }

        .processing {
            color: orange;
        }
    </style>
</head>

<body>

    <h2>CSV Processor Dashboard</h2>

    <!-- Upload -->
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>

    <hr>

    <!-- Tasks -->
    <button onclick="loadTasks()">Refresh tasks</button>

    <table>
        <thead>
            <tr>
                <th>File ID</th>
                <th>Status</th>
                <th>Attempts</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tasksTable"></tbody>
    </table>

</body>

</html>
