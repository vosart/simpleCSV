<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>CSV Processor</title>
    <script type="module" src="/static/js/ui/app.js" defer></script>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        td,
        th {
            border: 1px solid #ddd;
            padding: 8px;
        }

        .done {
            color: green;
        }

        .failed {
            color: red;
        }

        .processing {
            color: orange;
        }

        #pagination button {
            margin: 0 2px;
            padding: 4px 8px;
        }

        #pagination button:disabled {
            background: #ccc;
            cursor: default;
        }
    </style>
</head>

<body>
    <h2>CSV Processor Dashboard</h2>

    <!-- Upload -->
    <input type="file" id="fileInput">
    <button id="uploadBtn">Upload</button>

    <hr>

    <!-- Tasks -->
    <table>
        <thead>
            <tr>
                <th>File ID</th>
                <th>Status</th>
                <th>Attempts</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tasksTable"></tbody>
    </table>

    <!-- Pagination -->
    <div id="pagination"></div>
</body>

</html>
